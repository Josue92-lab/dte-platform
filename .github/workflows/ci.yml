name: CI Build & Test
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        global-json-file: global.json
    - name: Verify Formatting (.editorconfig)
      run: dotnet format --verify-no-changes
    - name: Restore dependencies
      run: dotnet restore DtePlatform.sln
    - name: Build
      run: dotnet build DtePlatform.sln --no-restore -c Release
    - name: Run Domain Tests
      run: dotnet test tests/DTE.Domain.Tests --no-build -c Release
    - name: Run Application Tests
      run: dotnet test tests/DTE.Application.Tests --no-build -c Release
    - name: Run Infrastructure Integration Tests
      run: dotnet test tests/DTE.Infrastructure.Tests --no-build -c Release
