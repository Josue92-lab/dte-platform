name: CI Build & Test
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
    - name: Verify Formatting (.editorconfig)
      run: dotnet format --verify-no-changes
    - name: Restore dependencies
      run: dotnet restore DtePlatform.sln
    - name: Build
      run: dotnet build DtePlatform.sln --no-restore -c Release
    - name: Run Domain Tests
      run: dotnet test tests/DTE.Domain.Tests --no-build -c Release --collect:"XPlat Code Coverage"
    - name: Run Application Tests
      run: dotnet test tests/DTE.Application.Tests --no-build -c Release --collect:"XPlat Code Coverage"
    - name: Run Infrastructure Integration Tests
      run: dotnet test tests/DTE.Infrastructure.Tests --no-build -c Release --collect:"XPlat Code Coverage"
    - name: Upload Coverage Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage
        path: '**/TestResults/*/coverage.cobertura.xml'
        if-no-files-found: ignore
