name: PR Validation
on:
  pull_request:
    branches: [ "main" ]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
        cache: true
        cache-dependency-path: '**/packages.lock.json'
    - name: Verify Formatting (.editorconfig)
      run: dotnet format --verify-no-changes
    - name: Restore dependencies
      run: dotnet restore DtePlatform.sln
    - name: Build (TreatWarningsAsErrors)
      run: dotnet build DtePlatform.sln --no-restore -c Release
    - name: Run Architecture Validation
      run: dotnet test tests/DTE.Architecture.Tests --no-build -c Release
    - name: Run Full Test Suite
      run: dotnet test DtePlatform.sln --no-build -c Release --collect:"XPlat Code Coverage"
    - name: Upload Coverage Results
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage
        path: '**/TestResults/*/coverage.cobertura.xml'
