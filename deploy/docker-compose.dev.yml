version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: dte_postgres_dev
    environment:
      POSTGRES_USER: dte_user
      POSTGRES_PASSWORD: dte_dev_pass
      POSTGRES_DB: dte_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dte_user -d dte_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_dev_data:
